name: Scrape Google Photos

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:          # manual trigger from Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: scraper/package-lock.json

      - name: Install dependencies
        working-directory: scraper
        run: npm ci

      - name: Install Puppeteer browser
        working-directory: scraper
        run: npx puppeteer browsers install chrome

      - name: Run scraper
        working-directory: scraper
        continue-on-error: true
        env:
          PHOTOS_ALBUM_URL: ${{ secrets.PHOTOS_ALBUM_URL }}
        run: node scrape.js

      - name: Commit debug files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/debug.png data/debug.html
          git diff --cached --quiet || git commit -m "debug: scraper output"
          git push

      - name: Commit updated photos.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/photos.json
          git diff --cached --quiet || git commit -m "chore: update photos.json [skip ci]"
          git push